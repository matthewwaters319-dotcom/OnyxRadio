<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onyx Radio — Web Radio</title>
    <link rel="icon" href="onyxradiologo.png" type="image/png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #08080D;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 100vh;
        }

        /* ===== TOP BAR ===== */
        .top-bar {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            background: #0E0E14;
            border-bottom: 1px solid #1A1A22;
            flex-shrink: 0;
        }
        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }
        .top-bar img { width: 24px; height: 24px; }
        .top-bar .server-name { font-size: 16px; font-weight: 700; }
        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .ptt-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #14141E;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 11px;
            color: #AAA;
        }
        .ptt-badge .icon { color: #5865F2; }
        .btn-sm {
            padding: 5px 12px;
            border-radius: 6px;
            border: none;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.15s;
        }
        .btn-sm.secondary { background: #1A1A24; color: #AAA; }
        .btn-sm.secondary:hover { background: #22222E; color: #CCC; }

        /* ===== TAB BAR ===== */
        .tab-bar {
            display: flex;
            background: #111118;
            border-bottom: 1px solid #1A1A22;
            padding: 0 16px;
            flex-shrink: 0;
        }
        .tab {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 9px 20px;
            margin-top: 4px;
            border-radius: 6px 6px 0 0;
            font-size: 11px;
            font-weight: 700;
            background: #5865F2;
            color: white;
        }

        /* ===== MAIN LAYOUT ===== */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* ===== CHANNEL SIDEBAR ===== */
        .channel-sidebar {
            width: 250px;
            background: #0C0C12;
            border-right: 1px solid #1A1A22;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .channel-sidebar-header {
            padding: 12px 14px 10px;
            border-bottom: 1px solid #1A1A22;
            font-size: 11px;
            font-weight: 700;
            color: #555;
        }
        .channel-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px 0;
        }
        .channel-list::-webkit-scrollbar { width: 4px; }
        .channel-list::-webkit-scrollbar-thumb { background: #1A1A22; border-radius: 2px; }

        .category-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px 6px;
            margin-top: 4px;
        }
        .category-header .expand-icon { font-size: 9px; color: #555; }
        .category-header .cat-name {
            font-size: 11px;
            font-weight: 700;
            color: #666;
            text-transform: uppercase;
        }

        .channel-row {
            display: flex;
            align-items: center;
            padding: 7px 12px;
            margin: 2px 8px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.12s;
        }
        .channel-row:hover { background: #14141C; }
        .channel-row.active { background: #12121C; }
        .channel-row .mic-icon {
            font-size: 13px;
            color: #555;
            margin-right: 10px;
            flex-shrink: 0;
        }
        .channel-row.active .mic-icon { color: #5865F2; }
        .channel-row .ch-name {
            font-size: 12px;
            font-weight: 600;
            color: #888;
            flex: 1;
        }
        .channel-row.active .ch-name { color: #DDD; }
        .channel-row .user-badge {
            background: #1A2420;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            color: #2ECC71;
        }

        .channel-user {
            display: flex;
            align-items: center;
            padding: 5px 14px 5px 36px;
            margin: 1px 8px 0;
            gap: 8px;
            animation: fadeIn 0.25s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .channel-user .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #555;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .channel-user .status-dot.transmitting {
            background: #2ECC71;
            box-shadow: 0 0 6px rgba(46, 204, 113, 0.4);
        }
        .channel-user .user-name { font-size: 11.5px; color: #AAA; }

        /* ===== DISPATCH AREA ===== */
        .dispatch-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0A0A0F;
        }
        .dispatch-header {
            padding: 16px 24px 12px;
            border-bottom: 1px solid #1A1A22;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .dispatch-header .mic-icon { font-size: 16px; color: #5865F2; }
        .dispatch-header .ch-label { font-size: 16px; font-weight: 700; }
        .dispatch-header .separator { font-size: 14px; color: #444; }
        .dispatch-header .user-count { font-size: 13px; color: #666; }
        .dispatch-header .room-code {
            margin-left: auto;
            font-family: monospace;
            font-size: 12px;
            background: #1A1A26;
            padding: 4px 10px;
            border-radius: 6px;
            color: #5865F2;
            cursor: pointer;
            transition: background 0.2s;
        }
        .dispatch-header .room-code:hover { background: #22223A; }

        .dispatch-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px 24px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 12px;
        }
        .dispatch-body::-webkit-scrollbar { width: 4px; }
        .dispatch-body::-webkit-scrollbar-thumb { background: #1A1A22; border-radius: 2px; }

        /* ===== USER CARDS ===== */
        .user-card {
            background: #111118;
            border: 1px solid #1E1E28;
            border-radius: 10px;
            padding: 14px 16px;
            width: 180px;
            transition: border-color 0.2s;
            animation: fadeIn 0.3s ease-out;
        }
        .user-card.transmitting { border-color: #2ECC71; }
        .user-card-top {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .user-card-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #1A1A24;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 700;
            color: #5865F2;
            flex-shrink: 0;
        }
        .user-card-info { flex: 1; min-width: 0; }
        .user-card-name {
            font-size: 13px;
            font-weight: 600;
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .user-card-name .you-tag { color: #5865F2; font-size: 10px; }
        .user-card-status {
            font-size: 10.5px;
            color: #666;
            margin-top: 1px;
            transition: color 0.2s;
        }
        .user-card-status.transmitting { color: #2ECC71; }
        .user-card-channel {
            display: inline-block;
            background: #14141E;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            color: #888;
        }

        /* ===== JOIN OVERLAY ===== */
        .join-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #08080Dee;
            z-index: 100;
        }
        .join-card {
            background: #0E0E14;
            border: 1px solid #1A1A22;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            width: 420px;
        }
        .join-card h2 { margin-bottom: 8px; font-size: 1.3rem; }
        .join-card p { color: #666; font-size: 0.9rem; margin-bottom: 24px; line-height: 1.5; }
        .join-card input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #1A1A22;
            background: #0A0A0F;
            color: white;
            font-size: 1rem;
            text-align: center;
            margin-bottom: 12px;
            outline: none;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .join-card input:focus { border-color: #5865F2; }
        .join-card input::placeholder {
            text-transform: none;
            letter-spacing: normal;
            color: #444;
        }
        .join-card .name-input {
            text-transform: none;
            letter-spacing: normal;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 12px 28px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }
        .btn-primary { background: #5865F2; color: white; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(88,101,242,0.35); }
        .btn-green { background: #3BA55D; color: white; }
        .btn-green:hover { background: #2d8049; }

        /* ===== STATUS BAR ===== */
        .status-bar {
            padding: 8px 20px;
            background: #0B0B10;
            border-top: 1px solid #1A1A22;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            color: #555;
            flex-shrink: 0;
        }
        .status-bar-left {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #3BA55D;
        }
        .status-indicator.disconnected { background: #ED4245; }
        .leave-btn {
            background: none;
            border: 1px solid #333;
            color: #999;
            padding: 4px 14px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .leave-btn:hover { border-color: #ED4245; color: #ED4245; }

        .hidden { display: none !important; }

        /* Mobile */
        @media (max-width: 768px) {
            .channel-sidebar { width: 200px; }
            .user-card { width: 160px; }
        }
        @media (max-width: 600px) {
            .channel-sidebar { display: none; }
            .user-card { width: 100%; }
        }
    </style>
</head>
<body>

    <!-- TOP BAR -->
    <div class="top-bar">
        <div class="top-bar-left">
            <img src="onyxradiologo.png" alt="Onyx Radio">
            <span class="server-name" id="serverName">Onyx Radio</span>
        </div>
        <div class="top-bar-right">
            <div class="ptt-badge">
                <span class="icon">🎙️</span>
                <span>PTT: Space</span>
            </div>
            <a href="index.html" class="btn-sm secondary">← Home</a>
        </div>
    </div>

    <!-- TAB BAR -->
    <div class="tab-bar">
        <div class="tab">
            <span>🎙️</span>
            <span>RADIO</span>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">

        <!-- JOIN OVERLAY -->
        <div class="join-overlay" id="joinOverlay">
            <div class="join-card">
                <h2>Join a Radio Room</h2>
                <p>Enter a room code to join an existing room, or create a new one. Share the code with others to let them join.</p>
                <input type="text" id="roomCodeInput" placeholder="Room code (e.g. ONYX-1234)" maxlength="12">
                <input type="text" class="name-input" id="displayName" placeholder="Your display name" maxlength="24">
                <button class="btn btn-primary" onclick="joinRoom()">Join Room</button>
                <button class="btn btn-green" onclick="createRoom()">Create New Room</button>
            </div>
        </div>

        <!-- CHANNEL SIDEBAR -->
        <div class="channel-sidebar">
            <div class="channel-sidebar-header">CHANNELS</div>
            <div class="channel-list" id="channelList"></div>
        </div>

        <!-- DISPATCH AREA -->
        <div class="dispatch-area">
            <div class="dispatch-header">
                <span class="mic-icon">🎙️</span>
                <span class="ch-label" id="dispatchChannelName">Dispatch</span>
                <span class="separator"> — </span>
                <span class="user-count" id="dispatchUserCount">0 users</span>
                <span class="room-code" id="roomCodeDisplay" title="Click to copy" onclick="copyRoomCode()">—</span>
            </div>
            <div class="dispatch-body" id="userCardsArea"></div>
        </div>
    </div>

    <!-- STATUS BAR -->
    <div class="status-bar hidden" id="statusBar">
        <div class="status-bar-left">
            <div class="status-indicator" id="statusDot"></div>
            <span id="statusText">Connected</span>
        </div>
        <button class="leave-btn" onclick="leaveRoom()">Leave Room</button>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script>
    (function() {
        // ===== STATE =====
        let peer = null;
        let connections = {};
        let localStream = null;
        let roomCode = '';
        let myName = '';
        let myChannel = 'Dispatch';
        let isTransmitting = false;
        let isInRoom = false;

        // Channel structure (matches the desktop app)
        const channelStructure = [
            { category: 'Patrol Ops', channels: ['Dispatch', 'Tactical'] }
        ];

        // ===== AUDIO =====
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playRadioClick() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(1800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.04);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.08);
        }

        function generateRoomCode() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let code = 'ONYX-';
            for (let i = 0; i < 4; i++) code += chars[Math.floor(Math.random() * chars.length)];
            return code;
        }

        // ===== MICROPHONE =====
        async function getMicrophone() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                localStream.getAudioTracks().forEach(t => t.enabled = false);
                return true;
            } catch (e) {
                alert('Microphone access is required for radio. Please allow mic access and try again.');
                return false;
            }
        }

        // ===== PEERJS =====
        function initPeer(roomId, isHost) {
            const peerId = isHost
                ? 'onyx-' + roomId + '-host'
                : 'onyx-' + roomId + '-' + Date.now() + '-' + Math.floor(Math.random() * 1000);

            peer = new Peer(peerId);

            peer.on('open', function() {
                updateStatus('Connected', true);
                if (!isHost) connectToPeer('onyx-' + roomId + '-host');
            });

            peer.on('connection', function(conn) { setupDataConnection(conn); });

            peer.on('call', function(call) {
                call.answer(localStream);
                setupMediaConnection(call);
            });

            peer.on('error', function(err) {
                if (err.type === 'peer-unavailable') {
                    alert('Room not found. Check the code and try again.');
                    leaveRoom();
                } else if (err.type === 'unavailable-id') {
                    alert('This room already has a host. Try joining instead.');
                    leaveRoom();
                }
            });

            peer.on('disconnected', function() {
                updateStatus('Reconnecting...', false);
                peer.reconnect();
            });
        }

        function connectToPeer(peerId) {
            if (connections[peerId]) return;
            var conn = peer.connect(peerId, { metadata: { name: myName, channel: myChannel } });
            setupDataConnection(conn);
            var call = peer.call(peerId, localStream, { metadata: { name: myName } });
            setupMediaConnection(call);
        }

        function setupDataConnection(conn) {
            conn.on('open', function() {
                connections[conn.peer] = connections[conn.peer] || {};
                connections[conn.peer].conn = conn;
                connections[conn.peer].name = conn.metadata && conn.metadata.name ? conn.metadata.name : 'Unknown';
                connections[conn.peer].channel = conn.metadata && conn.metadata.channel ? conn.metadata.channel : 'Dispatch';
                connections[conn.peer].speaking = false;

                conn.send({ type: 'info', name: myName, channel: myChannel });

                if (peer.id.endsWith('-host')) {
                    var peerList = Object.keys(connections).filter(function(p) { return p !== conn.peer; });
                    conn.send({ type: 'peers', peers: peerList });
                }
                rebuildUI();
            });

            conn.on('data', function(data) {
                if (data.type === 'info') {
                    connections[conn.peer] = connections[conn.peer] || {};
                    connections[conn.peer].name = data.name;
                    connections[conn.peer].channel = data.channel;
                    rebuildUI();
                } else if (data.type === 'peers') {
                    data.peers.forEach(function(p) { connectToPeer(p); });
                } else if (data.type === 'speaking') {
                    if (connections[conn.peer]) {
                        connections[conn.peer].speaking = data.value;
                        rebuildUI();
                    }
                } else if (data.type === 'channel') {
                    if (connections[conn.peer]) {
                        connections[conn.peer].channel = data.channel;
                        rebuildUI();
                    }
                }
            });

            conn.on('close', function() {
                var audio = document.getElementById('audio-' + conn.peer);
                if (audio) audio.remove();
                delete connections[conn.peer];
                rebuildUI();
            });
        }

        function setupMediaConnection(call) {
            call.on('stream', function(remoteStream) {
                connections[call.peer] = connections[call.peer] || {};
                connections[call.peer].call = call;
                connections[call.peer].stream = remoteStream;

                var audio = document.getElementById('audio-' + call.peer);
                if (!audio) {
                    audio = document.createElement('audio');
                    audio.id = 'audio-' + call.peer;
                    audio.autoplay = true;
                    document.body.appendChild(audio);
                }
                audio.srcObject = remoteStream;
                audio.muted = (connections[call.peer].channel !== myChannel);
            });

            call.on('close', function() {
                var audio = document.getElementById('audio-' + call.peer);
                if (audio) audio.remove();
            });
        }

        // ===== PTT =====
        function startTransmit() {
            if (!isInRoom || isTransmitting) return;
            isTransmitting = true;
            audioCtx.resume();
            playRadioClick();

            if (localStream) localStream.getAudioTracks().forEach(function(t) { t.enabled = true; });

            Object.values(connections).forEach(function(c) {
                if (c.conn && c.conn.open) c.conn.send({ type: 'speaking', value: true });
            });
            rebuildUI();
        }

        function stopTransmit() {
            if (!isTransmitting) return;
            isTransmitting = false;
            playRadioClick();

            if (localStream) localStream.getAudioTracks().forEach(function(t) { t.enabled = false; });

            Object.values(connections).forEach(function(c) {
                if (c.conn && c.conn.open) c.conn.send({ type: 'speaking', value: false });
            });
            rebuildUI();
        }

        // ===== UI BUILDING =====
        function buildChannelSidebar() {
            var list = document.getElementById('channelList');
            list.innerHTML = '';

            channelStructure.forEach(function(cat) {
                // Category header
                var catHeader = document.createElement('div');
                catHeader.className = 'category-header';
                catHeader.innerHTML = '<span class="expand-icon">▾</span><span class="cat-name">' + escapeHtml(cat.category) + '</span>';
                list.appendChild(catHeader);

                cat.channels.forEach(function(ch) {
                    var isActive = (ch === myChannel);
                    var count = isActive ? 1 : 0;
                    Object.values(connections).forEach(function(c) { if (c.channel === ch) count++; });

                    // Channel row
                    var row = document.createElement('div');
                    row.className = 'channel-row' + (isActive ? ' active' : '');
                    row.innerHTML = '<span class="mic-icon">🎙️</span><span class="ch-name">' + escapeHtml(ch) + '</span>' +
                        (count > 0 ? '<span class="user-badge">' + count + '</span>' : '');
                    row.addEventListener('click', (function(channel) {
                        return function() { switchChannel(channel); };
                    })(ch));
                    list.appendChild(row);

                    // Users under active channel
                    if (isActive) {
                        // My entry
                        var myEntry = document.createElement('div');
                        myEntry.className = 'channel-user';
                        myEntry.innerHTML = '<div class="status-dot ' + (isTransmitting ? 'transmitting' : '') + '"></div>' +
                            '<span class="user-name">' + escapeHtml(myName) + '</span>';
                        list.appendChild(myEntry);

                        // Other users
                        Object.values(connections).forEach(function(c) {
                            if (c.channel === ch) {
                                var entry = document.createElement('div');
                                entry.className = 'channel-user';
                                entry.innerHTML = '<div class="status-dot ' + (c.speaking ? 'transmitting' : '') + '"></div>' +
                                    '<span class="user-name">' + escapeHtml(c.name || 'Unknown') + '</span>';
                                list.appendChild(entry);
                            }
                        });
                    }
                });
            });
        }

        function buildUserCards() {
            var area = document.getElementById('userCardsArea');
            area.innerHTML = '';

            var usersInChannel = 1;
            Object.values(connections).forEach(function(c) { if (c.channel === myChannel) usersInChannel++; });
            document.getElementById('dispatchChannelName').textContent = myChannel;
            document.getElementById('dispatchUserCount').textContent = usersInChannel + ' user' + (usersInChannel !== 1 ? 's' : '');

            // My card
            area.appendChild(createUserCard(myName, myChannel, isTransmitting, true));

            // Other users in same channel
            Object.values(connections).forEach(function(c) {
                if (c.channel === myChannel) {
                    area.appendChild(createUserCard(c.name || 'Unknown', c.channel, c.speaking, false));
                }
            });
        }

        function createUserCard(name, channel, speaking, isMe) {
            var card = document.createElement('div');
            card.className = 'user-card' + (speaking ? ' transmitting' : '');

            var initial = name.length > 0 ? name[0].toUpperCase() : '?';

            card.innerHTML =
                '<div class="user-card-top">' +
                    '<div class="user-card-avatar">' + escapeHtml(initial) + '</div>' +
                    '<div class="user-card-info">' +
                        '<div class="user-card-name">' + escapeHtml(name) + (isMe ? ' <span class="you-tag">(you)</span>' : '') + '</div>' +
                        '<div class="user-card-status ' + (speaking ? 'transmitting' : '') + '">' + (speaking ? 'Transmitting' : 'Idle') + '</div>' +
                    '</div>' +
                '</div>' +
                '<div class="user-card-channel">' + escapeHtml(channel) + '</div>';
            return card;
        }

        function rebuildUI() {
            if (!isInRoom) return;
            buildChannelSidebar();
            buildUserCards();

            // Mute/unmute audio based on channel
            Object.keys(connections).forEach(function(pid) {
                var audio = document.getElementById('audio-' + pid);
                if (audio) audio.muted = (connections[pid].channel !== myChannel);
            });
        }

        function switchChannel(ch) {
            if (!isInRoom || ch === myChannel) return;
            myChannel = ch;
            if (isTransmitting) stopTransmit();

            Object.values(connections).forEach(function(c) {
                if (c.conn && c.conn.open) c.conn.send({ type: 'channel', channel: myChannel });
            });
            rebuildUI();
        }

        function updateStatus(text, connected) {
            document.getElementById('statusText').textContent = text;
            document.getElementById('statusDot').className = 'status-indicator' + (connected ? '' : ' disconnected');
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ===== ROOM MANAGEMENT =====
        window.createRoom = async function() {
            var name = document.getElementById('displayName').value.trim();
            if (!name) { alert('Please enter a display name.'); return; }
            var micOk = await getMicrophone();
            if (!micOk) return;
            myName = name;
            roomCode = generateRoomCode();
            enterRoom(true);
        };

        window.joinRoom = async function() {
            var code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
            var name = document.getElementById('displayName').value.trim();
            if (!code) { alert('Please enter a room code.'); return; }
            if (!name) { alert('Please enter a display name.'); return; }
            var micOk = await getMicrophone();
            if (!micOk) return;
            myName = name;
            roomCode = code;
            enterRoom(false);
        };

        function enterRoom(isHost) {
            document.getElementById('joinOverlay').classList.add('hidden');
            document.getElementById('statusBar').classList.remove('hidden');
            document.getElementById('roomCodeDisplay').textContent = roomCode;
            document.getElementById('serverName').textContent = 'Room: ' + roomCode;
            isInRoom = true;

            var roomId = roomCode.replace(/[^A-Z0-9]/g, '');
            initPeer(roomId, isHost);
            rebuildUI();
        }

        window.leaveRoom = function() {
            isInRoom = false;
            isTransmitting = false;

            Object.values(connections).forEach(function(c) {
                if (c.conn) c.conn.close();
                if (c.call) c.call.close();
            });
            connections = {};

            if (localStream) { localStream.getTracks().forEach(function(t) { t.stop(); }); localStream = null; }
            if (peer) { peer.destroy(); peer = null; }

            document.querySelectorAll('audio[id^="audio-"]').forEach(function(a) { a.remove(); });

            document.getElementById('joinOverlay').classList.remove('hidden');
            document.getElementById('statusBar').classList.add('hidden');
            document.getElementById('serverName').textContent = 'Onyx Radio';
            document.getElementById('channelList').innerHTML = '';
            document.getElementById('userCardsArea').innerHTML = '';
            myChannel = 'Dispatch';
        };

        window.copyRoomCode = function() {
            navigator.clipboard.writeText(roomCode).then(function() {
                var el = document.getElementById('roomCodeDisplay');
                var orig = el.textContent;
                el.textContent = 'Copied!';
                setTimeout(function() { el.textContent = orig; }, 1500);
            });
        };

        // ===== KEYBOARD PTT (SPACE) =====
        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space' && !e.repeat && isInRoom) {
                e.preventDefault();
                startTransmit();
            }
        });
        document.addEventListener('keyup', function(e) {
            if (e.code === 'Space') {
                e.preventDefault();
                stopTransmit();
            }
        });
        window.addEventListener('keydown', function(e) {
            if (e.code === 'Space' && isInRoom) e.preventDefault();
        });

        // Initial sidebar build
        buildChannelSidebar();
    })();
    </script>
</body>
</html>
